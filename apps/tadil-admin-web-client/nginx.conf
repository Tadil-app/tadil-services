server {
    listen ${PORT};
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html;

    # Proxy DeepL so the API key stays server-side and CORS is avoided.
    # Mirrors the Vite dev-server proxy in vite.config.ts (dev only).
    location = /deepl {
        # DNS resolver needed because proxy_pass uses a variable/hostname.
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 10s;

        set $deepl_upstream "https://api-free.deepl.com";
        proxy_pass $deepl_upstream/v2/translate;

        proxy_ssl_server_name on;
        proxy_set_header Host api-free.deepl.com;
        proxy_set_header Authorization "DeepL-Auth-Key f366302f-71a4-4899-a3f2-14e1b929f5e6:fx";
        proxy_set_header Content-Type "application/json";
    }

    # Serve static files and handle SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
