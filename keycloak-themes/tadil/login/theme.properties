# Tadil custom login theme
# Extends the stock "keycloak" login theme and appends our own stylesheet.
# `css/login.css` resolves from the parent theme (keeping PatternFly layout),
# `css/tadil.css` is our branding override and is loaded last so it wins.
parent=keycloak
import=common/keycloak

styles=css/login.css css/tadil.css
scripts=js/tadil.js
