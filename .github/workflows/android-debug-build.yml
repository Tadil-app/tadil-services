name: Build Android (Debug APK)

on:
  workflow_dispatch: # Allows you to manually trigger it via GitHub UI

jobs:
  build-android-debug:
    runs-on: ubuntu-latest # Using Ubuntu for Android builds is faster and standard

    defaults:
      run:
        working-directory: apps/tadil-mobile-app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets and Sync Capacitor
        run: npm run build-mobile
        env:
          VITE_TADIL_MOBILE_API_URL: ${{ secrets.VITE_TADIL_MOBILE_API_URL }}
          VITE_MOYASAR_PUBLISHABLE_KEY: ${{ secrets.VITE_MOYASAR_PUBLISHABLE_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: apps/tadil-mobile-app/android
        run: ./gradlew assembleDebug

      - name: Upload Debug APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tadil-app-debug
          path: apps/tadil-mobile-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7