name: Build Android (Signed Release APK)

on:
  workflow_dispatch: # Allows you to manually trigger it via GitHub UI

jobs:
  build-android-release:
    runs-on: ubuntu-latest # Using Ubuntu for Android builds is faster and standard

    defaults:
      run:
        working-directory: apps/tadil-mobile-app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets and Sync Capacitor
        run: npm run build-mobile
        env:
          VITE_TADIL_MOBILE_API_URL: ${{ secrets.VITE_TADIL_MOBILE_API_URL }}
          VITE_MOYASAR_PUBLISHABLE_KEY: ${{ secrets.VITE_MOYASAR_PUBLISHABLE_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo $ANDROID_KEYSTORE_BASE64 | base64 --decode > android/app/release.keystore

      - name: Build Release APK
        working-directory: apps/tadil-mobile-app/android
        env:
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_FILE: release.keystore
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.storeFile=release.keystore \
            -Pandroid.injected.signing.storePassword=$ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD \
            -Pandroid.injected.signing.keyAlias=$ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS \
            -Pandroid.injected.signing.keyPassword=$ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD

      - name: Upload Signed Release APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tadil-app-release
          path: apps/tadil-mobile-app/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7